<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>

            <img src="https://picsum.photos/200/150?random=4" alt="Foto 4">
            <p>Foto 4</p>
        </div>
        <div class="foto-item">
            <img src="https://picsum.photos/200/150?random=5" alt="Foto 5">
            <p>Foto 5</p>
        </div>
        <div class="foto-item">
            <img src="https://picsum.photos/200/150?random=6" alt="Foto 6">

</html>
