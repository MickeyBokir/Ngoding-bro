<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <link rel="stylesheet" href="flexbox.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>⚽</h2>
            <h3>Sepak Bola</h3>
            <p>Olahraga favoritku sejak kecil</p>
        </div>
        <div class="card">
            <h2>🏀</h2>
            <h3>Basket</h3>
            <p>Olahraga yang seru untuk dimainkan bersama teman-teman</p>
        </div>
        <div class="card">
            <h2>🏸</h2>
            <h3>Badminton</h3>
            <p>Olahraga yang menyenangkan dan bisa dimainkan di dalam ruangan</p>
        </div>
    </div>
</body>
</html>
