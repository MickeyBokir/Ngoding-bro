<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Belajar JavaScript</h1>

    <script>
        var nama = "Fajar";
        let umur = 25;
        const kota = "Tangerang";

        let hobi = ["Membaca", "Sepak Bola", "Memasak"];

        console.log("Nama: " + nama);
        console.log("Umur: " + umur);
        console.log("Kota: " + kota);
        console.log(hobi);

        let sapaan = `Halo, nama saya ${nama}, saya berumur ${umur} tahun dan saya tinggal di ${kota}.`;
        console.log(sapaan);

        console.log(umur + 10);
        console.log(umur * 2);
        console.log(umur % 3);
    </script>
</body>
</html>
